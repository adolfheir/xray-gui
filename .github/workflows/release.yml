name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, Universal)
        run: |
          xcodebuild \
            -project XrayGUI.xcodeproj \
            -scheme XrayGUI \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_HARDENED_RUNTIME=NO \
            build

      - name: Package .app → .zip
        run: |
          APP=$(find build/Build/Products/Release -name "XrayGUI.app" | head -1)
          echo "Found app: $APP"
          mkdir -p dist
          cp -r "$APP" dist/XrayGUI.app
          cd dist
          # Remove quarantine attribute so users can open without right-click
          xattr -cr XrayGUI.app
          zip -r --symlinks "XrayGUI-${{ github.ref_name }}-macOS.zip" XrayGUI.app
          echo "Package size: $(du -sh XrayGUI-${{ github.ref_name }}-macOS.zip | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: XrayGUI ${{ github.ref_name }}
          body: |
            ## XrayGUI ${{ github.ref_name }}

            A native macOS menu bar app for [Xray-core](https://github.com/XTLS/Xray-core).

            ### Installation
            1. Download `XrayGUI-${{ github.ref_name }}-macOS.zip`
            2. Unzip and drag `XrayGUI.app` to `/Applications`
            3. Download Xray binary from [XTLS/Xray-core releases](https://github.com/XTLS/Xray-core/releases)
            4. Launch XrayGUI → Settings → set Xray binary path

            > **Note:** App is unsigned. On first launch: right-click → Open, or run:
            > ```bash
            > xattr -cr /Applications/XrayGUI.app
            > ```
          files: dist/*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
