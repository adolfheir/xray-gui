name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Derive version
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Inject version into Info.plist
        run: |
          PLIST=XrayGUI/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$PLIST"
          # Keep the helper version aligned for display.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.ver.outputs.version }}" XrayHelper/Info.plist || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release, Universal)
        run: |
          set -o pipefail
          xcodebuild \
            -project XrayGUI.xcodeproj \
            -scheme XrayGUI \
            -configuration Release \
            -derivedDataPath build \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            ENABLE_HARDENED_RUNTIME=NO \
            build

      - name: Package .app → .zip + checksum
        id: pkg
        run: |
          APP=$(find build/Build/Products/Release -name "XrayGUI.app" | head -1)
          echo "Found app: $APP"
          test -n "$APP" || { echo "App not found"; exit 1; }
          mkdir -p dist
          cp -R "$APP" dist/XrayGUI.app
          cd dist
          # Strip quarantine, then ad-hoc re-sign the bundle (incl. the embedded helper)
          # so the arm64 binary carries the signature Apple Silicon requires to run.
          xattr -cr XrayGUI.app
          codesign --force --deep --sign - XrayGUI.app
          codesign --verify --deep --strict XrayGUI.app && echo "ad-hoc signature OK"
          ZIP="XrayGUI-${{ github.ref_name }}-macOS.zip"
          zip -r --symlinks "$ZIP" XrayGUI.app
          shasum -a 256 "$ZIP" > "$ZIP.sha256"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Package size: $(du -sh "$ZIP" | cut -f1)"
          cat "$ZIP.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: XrayGUI ${{ github.ref_name }}
          body: |
            ## XrayGUI ${{ github.ref_name }}

            A native macOS menu bar app for [Xray-core](https://github.com/XTLS/Xray-core).
            Universal binary (Apple Silicon + Intel).

            ### Features
            - Import nodes from share links (vmess / vless / trojan / ss / ssr / socks / http / hysteria2 / tuic) and subscriptions
            - System Proxy, TUN (via tun2socks + privileged helper), and Manual modes
            - Routing presets (Global / Bypass Mainland / Direct / Custom rules), split DNS
            - Latency testing, live traffic stats, English & 简体中文 UI

            ### Installation
            1. Download `XrayGUI-${{ github.ref_name }}-macOS.zip`
            2. Unzip and drag `XrayGUI.app` to `/Applications`
            3. Download an Xray binary from [XTLS/Xray-core releases](https://github.com/XTLS/Xray-core/releases)
            4. Launch XrayGUI → Settings → set the Xray binary path

            > **Note:** The app is ad-hoc signed but not notarized. After moving it to
            > `/Applications`, clear the download quarantine once so Gatekeeper allows it:
            > ```bash
            > xattr -cr /Applications/XrayGUI.app
            > ```
            > Then open it (right-click → Open the first time if prompted). TUN mode
            > additionally requires a Developer ID–signed build, a tun2socks binary, and
            > the privileged helper; System Proxy and Manual modes work as-is.
          files: |
            dist/*.zip
            dist/*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
